name: Design CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: design-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: bash scripts/check_design_tokens.sh
