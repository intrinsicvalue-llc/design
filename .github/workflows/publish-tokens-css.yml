name: Publish tokens-css

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: publish-tokens-css-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24" # npm >= 11.5.1 for OIDC trusted publishing
          registry-url: https://registry.npmjs.org
          scope: "@intrinsicvalue-llc"
          package-manager-cache: false

      - name: Build tokens
        run: node build.mjs

      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: npm/tokens-css
        run: npm version "${GITHUB_REF#refs/tags/v}" --no-git-tag-version --allow-same-version

      - name: Publish to npm (OIDC; falls back to NPM_TOKEN for bootstrap)
        working-directory: npm/tokens-css
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
